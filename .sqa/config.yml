config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue:
      branch: develop
      repo: https://github.com/madgeek-arc/resource-catalogue
    github.com/madgeek-arc/resource-catalogue-docs:
      branch: master
      repo: https://github.com/madgeek-arc/resource-catalogue-docs
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-charcoal-abyssinian.sh
        container: qc.acc_boozy-ultramarine-ant
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue-docs find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.seedy-chartreuse-birman.sh
        container: qc.doc_nerdy-cerise-hyena
      github.com/madgeek-arc/resource-catalogue-docs git:
        commands:
        - /usr/bin/env sh .sqa/script.slaphappy-mauve-wolfhound.sh
        container: qc.doc_blurry-denim-oyster
      github.com/madgeek-arc/resource-catalogue-docs markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.surly-gamboge-warthog.sh
        container: qc.doc_flimsy-saffron-whale
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-corn-greyhound.sh
        container: qc.lic_nippy-charcoal-snake
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.ready-silver-grouse.sh
        container: qc.sty_stinky-celadon-bison
      github.com/madgeek-arc/resource-catalogue hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.cheeky-ochre-affenpinscher.sh
        container: qc.sty_snazzy-grey-balinese
      github.com/madgeek-arc/resource-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-seashell-tetra.sh
        container: qc.sty_beady-cornflower-mule
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.clammy-gold-turtle.sh
        container: qc.ver_breezy-russet-insect
timeout: 5400
