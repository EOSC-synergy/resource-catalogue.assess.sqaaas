config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/Ophidia
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue:
      branch: feature/bpmn
      repo: https://github.com/madgeek-arc/resource-catalogue
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-emerald-dolphin.sh
        container: qc.acc_beady-blue-dunker
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.gloppy-white-impala.sh
        container: qc.doc_sunny-persimmon-molly
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.cheeky-cerise-chicken.sh
        container: qc.doc_seedy-sangria-coyote
      github.com/madgeek-arc/resource-catalogue markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.homey-bistre-labradoodle.sh
        container: qc.doc_woolly-tan-labradoodle
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.sleazy-olivine-clam.sh
        container: qc.lic_zippy-peach-setter
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-turquoise-termite.sh
        container: qc.sty_cranky-pink-spider
      github.com/madgeek-arc/resource-catalogue hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-vermilion-termite.sh
        container: qc.sty_pokey-chestnut-coati
      github.com/madgeek-arc/resource-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.chummy-cinnamon-zonkey.sh
        container: qc.sty_shaky-lime-sheepdog
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.ready-rust-wallaby.sh
        container: qc.ver_freaky-vermilion-slug
timeout: 5400
