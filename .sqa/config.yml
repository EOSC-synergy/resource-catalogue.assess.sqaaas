config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/Ophidia
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue:
      branch: master
      repo: https://github.com/madgeek-arc/resource-catalogue
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.thirsty-bronze-malamute.sh
        container: qc.acc_homey-amaranth-moth
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.craggy-cerise-olm.sh
        container: qc.doc_cranky-purple-caiman
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.sunny-azure-kiwi.sh
        container: qc.doc_droopy-burgundy-tuatara
      github.com/madgeek-arc/resource-catalogue markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-buff-wolf.sh
        container: qc.doc_blurry-grey-binturong
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.crabby-mauve-warthog.sh
        container: qc.lic_queasy-amaranth-lobster
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-thistle-warthog.sh
        container: qc.sty_lumpy-violet-clam
      github.com/madgeek-arc/resource-catalogue hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.sleepy-rust-guppy.sh
        container: qc.sty_skinny-maroon-oriole
      github.com/madgeek-arc/resource-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.sloppy-cinnamon-turkey.sh
        container: qc.sty_slimy-beige-wolfhound
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.homey-orange-ray.sh
        container: qc.ver_crabby-saffron-alligator
timeout: 5400
