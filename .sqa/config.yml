config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue:
      branch: master
      repo: https://github.com/madgeek-arc/resource-catalogue
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-bronze-owl.sh
        container: qc.acc_leaky-crimson-spider
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.frumpy-gamboge-camel.sh
        container: qc.doc_gamy-silver-kiwi
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-ivory-paradise.sh
        container: qc.doc_chummy-pink-beetle
      github.com/madgeek-arc/resource-catalogue markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-brown-opossum.sh
        container: qc.doc_nerdy-jade-tapir
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.chewy-flax-fox.sh
        container: qc.lic_homely-cornflower-crab
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.chewy-eggplant-zonkey.sh
        container: qc.sty_lumpy-crimson-spaniel
      github.com/madgeek-arc/resource-catalogue hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.blurry-amethyst-balinese.sh
        container: qc.sty_gamy-pumpkin-cichlid
      github.com/madgeek-arc/resource-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.skanky-razzmatazz-olm.sh
        container: qc.sty_slaphappy-peach-akbash
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-rose-zorse.sh
        container: qc.ver_gimpy-puce-moose
timeout: 5400
