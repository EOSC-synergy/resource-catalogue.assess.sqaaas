config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue:
      branch: master
      repo: https://github.com/madgeek-arc/resource-catalogue
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-orange-rabbit.sh
        container: qc.acc_blurry-zucchini-owl
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.boozy-taupe-sparrow.sh
        container: qc.doc_hilly-salmon-crocodile
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-champagne-kangaroo.sh
        container: qc.doc_baggy-pear-pinscher
      github.com/madgeek-arc/resource-catalogue markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.paltry-olivine-foxhound.sh
        container: qc.doc_slimy-jade-booby
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.woolly-crimson-hyrax.sh
        container: qc.lic_boozy-copper-reindeer
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.stuffy-khaki-bat.sh
        container: qc.sty_sickly-smalt-cuttlefish
      github.com/madgeek-arc/resource-catalogue hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-champagne-pig.sh
        container: qc.sty_freaky-thistle-millipede
      github.com/madgeek-arc/resource-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-xanthic-bullfrog.sh
        container: qc.sty_snoopy-olivine-caterpillar
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.woozy-aqua-barnacle.sh
        container: qc.ver_squirrely-azure-gharial
timeout: 5400
