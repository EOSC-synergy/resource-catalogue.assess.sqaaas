config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue:
      branch: develop
      repo: https://github.com/madgeek-arc/resource-catalogue
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.woolly-indigo-maltese.sh
        container: qc.acc_snippy-ivory-peccary
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.scaly-gamboge-caterpillar.sh
        container: qc.doc_muzzy-periwinkle-husky
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-charcoal-ocelot.sh
        container: qc.doc_frumpy-sapphire-liger
      github.com/madgeek-arc/resource-catalogue markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.chewy-rust-mouse.sh
        container: qc.doc_flabby-cyan-meerkat
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-myrtle-dodo.sh
        container: qc.lic_nippy-celadon-binturong
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-lime-beaver.sh
        container: qc.sty_hasty-olivine-wolf
      github.com/madgeek-arc/resource-catalogue hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.shaky-azure-ibis.sh
        container: qc.sty_seedy-black-indri
      github.com/madgeek-arc/resource-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.snoopy-green-hare.sh
        container: qc.sty_cloudy-champagne-kudu
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.skanky-coral-olm.sh
        container: qc.ver_lousy-razzmatazz-shark
timeout: 5400
