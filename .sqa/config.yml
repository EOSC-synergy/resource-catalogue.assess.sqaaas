config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue:
      branch: master
      repo: https://github.com/madgeek-arc/resource-catalogue
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-smalt-whale.sh
        container: qc.acc_shabby-bistre-dog
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-yellow-frigatebird.sh
        container: qc.doc_woolly-emerald-dugong
      github.com/madgeek-arc/resource-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.gummy-cardinal-panda.sh
        container: qc.doc_gamy-rose-wolf
      github.com/madgeek-arc/resource-catalogue markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.geeky-eggplant-forest.sh
        container: qc.doc_shaky-bronze-whippet
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.greasy-lemon-goose.sh
        container: qc.lic_muggy-eggplant-grouse
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-olive-guppy.sh
        container: qc.sty_squeaky-scarlet-dodo
      github.com/madgeek-arc/resource-catalogue hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.randy-fuchsia-coati.sh
        container: qc.sty_silly-taupe-civet
      github.com/madgeek-arc/resource-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.sloppy-cardinal-toad.sh
        container: qc.sty_cozy-mustard-liger
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-puce-tetra.sh
        container: qc.ver_squirrely-coral-mule
timeout: 5400
